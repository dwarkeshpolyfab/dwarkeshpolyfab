<body>

  <!-- Floating WhatsApp -->
  <div id="wa-float-placeholder"></div>
  <script>
  fetch('components/whatsapp-float.html')
    .then(r => r.text())
    .then(html => {

    });
  </script>

  <!-- Header -->
  <div id="header-placeholder" style="position:sticky;top:0;z-index:9999;"></div>
  <script>
  fetch('components/header.html')
    .then(r => r.text())
    .then(html => {
      const p = document.getElementById('header-placeholder');
      p.innerHTML = html;
      p.querySelectorAll('script').forEach(s => {
        const ns = document.createElement('script');
        ns.textContent = s.textContent;
        document.body.appendChild(ns);
        s.remove();
      });
    });
  </script>

  <!-- HERO -->
  <div id="hero-placeholder"></div>

  <!-- PRODUCTS -->
  <div id="products-placeholder"></div>

  <!-- INDUSTRIES -->
  <div id="industries-placeholder"></div>

  <!-- FAQ -->
  <div id="faq-placeholder"></div>

  <!-- FOOTER -->
  <div id="footer-placeholder"></div>

  <script>
  // ============================================
  // COMPONENT LOADER
  // ============================================
  function loadComponent(file, placeholderId) {
    fetch(file)
      .then(res => res.text())
      .then(html => {
        document.getElementById(placeholderId).innerHTML = html;
      })
      .catch(err => console.error('Error loading ' + file, err));
  }

  loadComponent('components/header.html',     'header-placeholder');
  loadComponent('components/hero.html',       'hero-placeholder');
  loadComponent('components/products.html',   'products-placeholder');
  loadComponent('components/industries.html', 'industries-placeholder');
  loadComponent('components/footer.html',     'footer-placeholder');

  // FAQ loads separately
  fetch('components/faq.html')
    .then(res => res.text())
    .then(html => {
      document.getElementById('faq-placeholder').innerHTML = html;
      initFaq();
    });

  // ============================================
  // FAQ ACCORDION
  // ============================================
  function initFaq() {
    document.querySelectorAll('.faq-question').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var answer = btn.nextElementSibling;
        var icon   = btn.querySelector('.faq-icon');
        var isOpen = btn.classList.contains('active');

        document.querySelectorAll('.faq-answer').forEach(function(a) {
          a.style.maxHeight = '0px';
          a.style.padding   = '0 20px';
        });
        document.querySelectorAll('.faq-icon').forEach(function(i) {
          i.textContent = '+';
        });
        document.querySelectorAll('.faq-question').forEach(function(b) {
          b.classList.remove('active');
        });

        if (!isOpen) {
          answer.style.maxHeight = answer.scrollHeight + 30 + 'px';
          answer.style.padding   = '15px 20px';
          icon.textContent       = '−';
          btn.classList.add('active');
        }
      });
    });
  }

  // ============================================
  // HERO SLIDER
  // ============================================
  window.addEventListener('load', function () {
    setTimeout(initSlider, 300);
  });

  function initSlider() {
    var slides = document.querySelectorAll('.slide');
    var dots   = document.querySelectorAll('.dot');
    var titleEl = document.getElementById('slide-title');
    if (!slides.length) return;

    var current = 0;
    var interval;

    var titles = [];
    slides.forEach(function(s) {
      titles.push(s.getAttribute('data-title') || '');
    });

    function goTo(n) {
      slides[current].classList.remove('active');
      if (dots[current]) dots[current].classList.remove('active');
      current = (n + slides.length) % slides.length;
      slides[current].classList.add('active');
      if (dots[current]) dots[current].classList.add('active');
      if (titleEl) titleEl.textContent = titles[current];
    }

    function startAuto() {
      interval = setInterval(function () { goTo(current + 1); }, 3500);
    }

    function stopAuto() { clearInterval(interval); }

    window.goToSlide = function(n) { stopAuto(); goTo(n); startAuto(); };

    startAuto();
  }
  </script>
