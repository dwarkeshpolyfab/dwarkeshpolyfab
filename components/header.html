<!-- ================================================ -->
<!-- HEADER COMPONENT - components/header.html        -->
<!-- Dwarkesh Polyfab — Professional Header           -->
<!-- ================================================ -->

<style>

  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Lato:wght@300;400;600;700&display=swap');

  .site-header {
    background: #112a46;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    width: 100%;
  }

  /* ── Top gold shimmer line ── */
  .site-header::before {
    content: '';
    display: block;
    height: 3px;
    background: linear-gradient(90deg, transparent 0%, #c9a64b 25%, #f0d97a 50%, #c9a64b 75%, transparent 100%);
  }

  /* ── Bottom gold border ── */
  .site-header::after {
    content: '';
    display: block;
    height: 1px;
    background: rgba(201,166,75,0.35);
  }

  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 36px;
    height: 68px;
    max-width: 1400px;
    margin: 0 auto;
    gap: 20px;
  }

  /* ════════════════════════════
     LOGO + BRAND AREA
  ════════════════════════════ */
  .logo-area {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    flex-shrink: 0;
    min-width: 0;
  }

  .logo-img-wrap {
    width: 46px;
    height: 46px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-img-wrap img {
    max-height: 46px;
    max-width: 46px;
    width: auto;
    height: auto;
    border-radius: 4px;
    display: block;
    filter: drop-shadow(0 0 6px rgba(201,166,75,0.45));
  }

  .brand-divider {
    width: 1px;
    height: 38px;
    background: linear-gradient(to bottom, transparent, #c9a64b 40%, #c9a64b 60%, transparent);
    flex-shrink: 0;
    opacity: 0.7;
  }

  .brand-text {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
  }

  .brand-name {
    font-family: 'Cinzel', Georgia, serif;
    font-size: 19px;
    font-weight: 900;
    color: #c9a64b;
    letter-spacing: 2.5px;
    white-space: nowrap;
    line-height: 1;
    text-shadow: 0 0 20px rgba(201,166,75,0.25);
  }

  .brand-tagline {
    font-family: 'Lato', Arial, sans-serif;
    font-size: 9.5px;
    font-weight: 400;
    color: #7fa3bf;
    letter-spacing: 4px;
    text-transform: uppercase;
    white-space: nowrap;
    line-height: 1;
  }

  /* ════════════════════════════
     NAVIGATION
  ════════════════════════════ */
  .main-nav {
    display: flex;
    align-items: center;
    gap: 0;
    flex: 1;
    justify-content: center;
  }

  .main-nav a {
    font-family: 'Lato', Arial, sans-serif;
    color: #c8d8e4;
    text-decoration: none;
    font-size: 12px;
    font-weight: 700;
    padding: 8px 16px;
    border-radius: 4px;
    transition: color 0.2s, background 0.2s;
    text-transform: uppercase;
    letter-spacing: 1px;
    white-space: nowrap;
    position: relative;
  }

  .main-nav a::after {
    content: '';
    position: absolute;
    bottom: 3px;
    left: 16px;
    right: 16px;
    height: 2px;
    background: #c9a64b;
    border-radius: 1px;
    transform: scaleX(0);
    transition: transform 0.22s ease;
    transform-origin: center;
  }

  .main-nav a:hover {
    color: #c9a64b;
    background: rgba(201,166,75,0.07);
  }

  .main-nav a:hover::after {
    transform: scaleX(1);
  }

  /* ════════════════════════════
     WHATSAPP BUTTON — PROFESSIONAL
  ════════════════════════════ */
  .header-contact {
    flex-shrink: 0;
  }

  .wa-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    padding: 6px 14px;
    height: 44px;
    border-radius: 6px;
    background: #1a9e4a;
    border: 1.5px solid #22b855;
    box-shadow: 0 2px 10px rgba(26,158,74,0.3);
    transition: all 0.25s ease;
    white-space: nowrap;
    box-sizing: border-box;
    flex-shrink: 0;
  }

  .wa-btn:hover {
    background: #20b854;
    border-color: #2dcf65;
    box-shadow: 0 4px 18px rgba(26,158,74,0.5), inset 0 1px 0 rgba(255,255,255,0.15);
    transform: translateY(-1px);
  }

  .wa-icon {
    width: 22px;
    height: 22px;
    min-width: 22px;
    flex-shrink: 0;
    display: block;
    object-fit: contain;
    filter: brightness(1.1);
  }

  .wa-btn-text {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 1px;
  }

  .wa-label {
    font-family: 'Lato', Arial, sans-serif;
    font-size: 8px;
    font-weight: 700;
    color: rgba(255,255,255,0.75);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    line-height: 1;
  }

  .wa-number {
    font-family: 'Lato', Arial, sans-serif;
    font-size: 12.5px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 0.5px;
    line-height: 1;
  }

  /* ════════════════════════════
     MOBILE RESPONSIVE
  ════════════════════════════ */
  @media (max-width: 1100px) {
    .header-inner {
      padding: 0 20px;
      gap: 10px;
    }
    .main-nav a {
      font-size: 11px;
      padding: 8px 11px;
    }
  }

  @media (max-width: 900px) {
    .header-inner {
      height: auto;
      flex-wrap: wrap;
      padding: 12px 16px;
    }
    .main-nav {
      order: 3;
      width: 100%;
      justify-content: center;
      flex-wrap: wrap;
      padding-bottom: 6px;
    }
    .main-nav a {
      font-size: 11px;
      padding: 7px 10px;
    }
    .brand-name { font-size: 16px; }
  }

  @media (max-width: 500px) {
    .brand-divider { display: none; }
    .wa-label { display: none; }
    .wa-btn { padding: 0 14px; }
  }

</style>


<header class="site-header">
  <div class="header-inner">

    <!-- ── LOGO + BRAND ── -->
    <a href="index.html" class="logo-area">
      <div class="logo-img-wrap">
        <img src="assets/images/logo.png" alt="Dwarkesh Polyfab Logo">
      </div>
      <div class="brand-divider"></div>
      <div class="brand-text">
        <span class="brand-name">Dwarkesh Polyfab</span>
        <span class="brand-tagline">Woven Packaging Solution</span>
      </div>
    </a>

    <!-- ── NAVIGATION ── -->
    <nav class="main-nav">
      <a href="index.html">Home</a>
      <a href="products/index.html">Products</a>
      <a href="calculators/index.html">Calculators</a>
      <a href="industries/index.html">Industries</a>
      <a href="blog/index.html">Blog</a>
      <a href="pages/contact.html">Contact</a>
    </nav>

    <!-- ── WHATSAPP BUTTON ── -->
    <div class="header-contact">
      <a class="wa-btn" href="https://wa.me/918320525550" target="_blank">
        <img class="wa-icon" src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp">
        <div class="wa-btn-text">
          <span class="wa-label">WhatsApp Us</span>
          <span class="wa-number">+91 83205 25550</span>
        </div>
      </a>
    </div>

  </div>
</header>
