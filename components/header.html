<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Lato:wght@300;400;600;700&display=swap');

.site-header *, .site-header *::before, .site-header *::after {
  box-sizing: border-box; margin: 0; padding: 0;
}
.site-header {
  width: 100%; background: #112a46;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4); overflow: visible;
}
.site-header::before {
  content: ''; display: block; height: 3px;
  background: linear-gradient(90deg, transparent, #c9a64b 30%, #f0d97a 50%, #c9a64b 70%, transparent);
}
.header-inner {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; height: 64px; max-width: 1400px; margin: 0 auto; gap: 12px;
}
.logo-area {
  display: flex; align-items: center; gap: 11px;
  text-decoration: none; flex-shrink: 0;
}
.logo-area img {
  height: 40px; width: 40px; object-fit: contain; border-radius: 4px; display: block;
  filter: drop-shadow(0 0 5px rgba(201,166,75,0.4));
}
.brand-divider {
  width: 1px; height: 32px;
  background: linear-gradient(to bottom, transparent, #c9a64b, transparent); flex-shrink: 0;
}
.brand-text { display: flex; flex-direction: column; gap: 3px; }
.brand-name {
  font-family: 'Cinzel', Georgia, serif; font-size: 17px; font-weight: 900;
  color: #c9a64b; letter-spacing: 1.8px; white-space: nowrap; line-height: 1;
}
.brand-tagline {
  font-family: 'Lato', Arial, sans-serif; font-size: 8.5px; font-weight: 400;
  color: #7fa3bf; letter-spacing: 3px; text-transform: uppercase; white-space: nowrap; line-height: 1;
}
.main-nav {
  display: flex; align-items: center; flex: 1; justify-content: center; gap: 0;
}
.main-nav a {
  font-family: 'Lato', Arial, sans-serif; color: #c8d8e4; text-decoration: none;
  font-size: 11.5px; font-weight: 700; padding: 6px 10px; border-radius: 4px;
  transition: color 0.2s, background 0.2s; text-transform: uppercase;
  letter-spacing: 0.7px; white-space: nowrap; position: relative;
}
.main-nav a::after {
  content: ''; position: absolute; bottom: 2px; left: 10px; right: 10px;
  height: 1.5px; background: #c9a64b; transform: scaleX(0); transition: transform 0.2s ease;
}
.main-nav a:hover { color: #c9a64b; background: rgba(201,166,75,0.08); }
.main-nav a:hover::after { transform: scaleX(1); }

.header-contact { flex-shrink: 0; }
.wa-btn {
  display: inline-flex; align-items: center; gap: 7px; text-decoration: none;
  padding: 8px 13px; border-radius: 6px; background: #1a9e4a;
  border: 1.5px solid #22b855; box-shadow: 0 2px 10px rgba(26,158,74,0.3);
  transition: all 0.25s ease; white-space: nowrap;
}
.wa-btn:hover { background: #20b854; transform: translateY(-1px); }
.wa-icon { width: 19px; height: 19px; min-width: 19px; display: block; }
.wa-btn-text { display: flex; flex-direction: column; gap: 2px; }
.wa-label {
  font-family: 'Lato', Arial, sans-serif; font-size: 7.5px; font-weight: 700;
  color: rgba(255,255,255,0.75); letter-spacing: 1.5px; text-transform: uppercase; line-height: 1;
}
.wa-number {
  font-family: 'Lato', Arial, sans-serif; font-size: 11.5px; font-weight: 700;
  color: #ffffff; line-height: 1;
}
.hamburger {
  display: none; flex-direction: column; justify-content: center; gap: 5px;
  width: 36px; height: 36px; background: rgba(201,166,75,0.1);
  border: 1.5px solid rgba(201,166,75,0.4); border-radius: 6px;
  cursor: pointer; padding: 8px; flex-shrink: 0; transition: background 0.2s;
}
.hamburger span {
  display: block; height: 2px; width: 100%; background: #c9a64b;
  border-radius: 2px; transition: all 0.3s ease;
}
.hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
.hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
.mobile-nav {
  display: none; flex-direction: column; background: #0d2038;
  border-top: 1px solid rgba(201,166,75,0.2); overflow: hidden; max-height: 0;
  transition: max-height 0.35s ease;
}
.mobile-nav.open { max-height: 500px; }
.mobile-nav a {
  font-family: 'Lato', Arial, sans-serif; color: #c8d8e4; text-decoration: none;
  font-size: 13px; font-weight: 600; padding: 14px 24px; text-transform: uppercase;
  letter-spacing: 1px; border-bottom: 1px solid rgba(255,255,255,0.05);
  transition: color 0.2s, background 0.2s; display: flex; align-items: center; gap: 10px;
}
.mobile-nav a:hover { color: #c9a64b; background: rgba(201,166,75,0.07); }
.mobile-nav-wa {
  background: rgba(26,158,74,0.12) !important; color: #4ade80 !important;
  border-top: 1px solid rgba(26,158,74,0.2) !important; font-weight: 700 !important;
}
@media (max-width: 768px) {
  .hamburger { display: flex; }
  .main-nav { display: none; }
  .mobile-nav { display: flex; }
  .wa-label { display: none; }
  .header-inner { padding: 0 14px; height: 58px; gap: 8px; }
  .wa-btn { padding: 6px 10px; gap: 6px; }
  .wa-number { font-size: 11px; }
  .brand-name { font-size: 14px; }
  .brand-tagline { font-size: 7.5px; }
  .logo-area img { height: 36px; width: 36px; }
}
@media (max-width: 400px) {
  .brand-divider { display: none; }
  .brand-name { font-size: 13px; }
}
</style>

<header class="site-header">
  <div class="header-inner">
    <a href="/" class="logo-area">
      <img src="https://www.dwarkeshpolyfab.com/assets/images/logo.png" alt="Dwarkesh Polyfab Logo">
      <div class="brand-divider"></div>
      <div class="brand-text">
        <span class="brand-name">Dwarkesh Polyfab</span>
        <span class="brand-tagline">Woven Packaging Solution</span>
      </div>
    </a>
    <nav class="main-nav">
<a href="/">Home</a>
<a href="/products/index.html">Products</a>
<a href="/calculators/index.html">Calculators</a>
<a href="/industries/index.html">Industries</a>
<a href="/blog/index.html">Blog</a>
<a href="/pages/about.html">About</a>
<a href="/pages/contact.html">Contact</a>
    </nav>
    <div class="header-contact">
      <a class="wa-btn" href="https://wa.me/918320525550" target="_blank">
        <img class="wa-icon" src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp">
        <div class="wa-btn-text">
          <span class="wa-label">WhatsApp Us</span>
          <span class="wa-number">+91 83205 25550</span>
        </div>
      </a>
    </div>
    <button class="hamburger" id="hamburger" aria-label="Open Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
  <nav class="mobile-nav" id="mobile-nav">
<a href="/">🏠 Home</a>
<a href="/products/index.html">🛍️ Products</a>
<a href="/calculators/index.html">🧮 Calculator</a>
<a href="/industries/index.html">🏭 Industries</a>
<a href="/blog/index.html">📝 Blog</a>
<a href="/pages/about.html">ℹ️ About Us</a>
<a href="/pages/contact.html">📞 Contact</a>
    <a href="https://wa.me/918320525550" target="_blank" class="mobile-nav-wa">💬 WhatsApp: +91 8320525550</a>
  </nav>
</header>

<script>
(function() {
  var btn = document.getElementById('hamburger');
  var nav = document.getElementById('mobile-nav');
  if (!btn || !nav) return;
  btn.addEventListener('click', function() {
    var isOpen = btn.classList.toggle('open');
    nav.classList.toggle('open');
    btn.setAttribute('aria-label', isOpen ? 'Close Menu' : 'Open Menu');
  });
  nav.querySelectorAll('a').forEach(function(a) {
    a.addEventListener('click', function() {
      btn.classList.remove('open');
      nav.classList.remove('open');
    });
  });
})();
</script>
