<!-- components/header.html — Dwarkesh Polyfab -->

<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Lato:wght@300;400;600;700&display=swap');

.site-header {
  width: 100%;
  background: #112a46;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}

.site-header::before {
  content: '';
  display: block;
  height: 3px;
  background: linear-gradient(90deg, transparent, #c9a64b 30%, #f0d97a 50%, #c9a64b 70%, transparent);
}

.header-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 30px;
  max-width: 1400px;
  margin: 0 auto;
  gap: 16px;
  box-sizing: border-box;
}

/* ── LOGO + BRAND ── */
.logo-area {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
  flex-shrink: 0;
}

.logo-area img {
  height: 44px;
  width: 44px;
  object-fit: contain;
  border-radius: 4px;
  display: block;
  filter: drop-shadow(0 0 5px rgba(201,166,75,0.4));
}

.brand-divider {
  width: 1px;
  height: 36px;
  background: linear-gradient(to bottom, transparent, #c9a64b, transparent);
  flex-shrink: 0;
}

.brand-text {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.brand-name {
  font-family: 'Cinzel', Georgia, serif;
  font-size: 18px;
  font-weight: 900;
  color: #c9a64b;
  letter-spacing: 2px;
  white-space: nowrap;
  line-height: 1;
}

.brand-tagline {
  font-family: 'Lato', Arial, sans-serif;
  font-size: 9px;
  font-weight: 400;
  color: #7fa3bf;
  letter-spacing: 3.5px;
  text-transform: uppercase;
  white-space: nowrap;
  line-height: 1;
}

/* ── NAV ── */
.main-nav {
  display: flex;
  align-items: center;
  flex: 1;
  justify-content: center;
  flex-wrap: nowrap;
  gap: 0;
}

.main-nav a {
  font-family: 'Lato', Arial, sans-serif;
  color: #c8d8e4;
  text-decoration: none;
  font-size: 12px;
  font-weight: 700;
  padding: 6px 12px;
  border-radius: 4px;
  transition: color 0.2s, background 0.2s;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  white-space: nowrap;
}

.main-nav a:hover {
  color: #c9a64b;
  background: rgba(201,166,75,0.08);
}

/* ── WHATSAPP BUTTON ── */
.header-contact {
  flex-shrink: 0;
}

.wa-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  padding: 8px 14px;
  border-radius: 6px;
  background: #1a9e4a;
  border: 1.5px solid #22b855;
  box-shadow: 0 2px 10px rgba(26,158,74,0.3);
  transition: all 0.25s ease;
  white-space: nowrap;
  box-sizing: border-box;
}

.wa-btn:hover {
  background: #20b854;
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(26,158,74,0.45);
}

.wa-icon {
  width: 20px;
  height: 20px;
  min-width: 20px;
  display: block;
  object-fit: contain;
}

.wa-btn-text {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.wa-label {
  font-family: 'Lato', Arial, sans-serif;
  font-size: 8px;
  font-weight: 700;
  color: rgba(255,255,255,0.7);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  line-height: 1;
}

.wa-number {
  font-family: 'Lato', Arial, sans-serif;
  font-size: 12px;
  font-weight: 700;
  color: #ffffff;
  letter-spacing: 0.3px;
  line-height: 1;
}

/* ── MOBILE ── */
@media (max-width: 1050px) {
  .header-inner { padding: 10px 16px; gap: 10px; }
  .main-nav a { font-size: 11px; padding: 6px 8px; }
  .brand-name { font-size: 15px; }
}

@media (max-width: 768px) {
  .header-inner {
    flex-wrap: wrap;
    padding: 10px 16px;
  }
  .main-nav {
    order: 3;
    width: 100%;
    justify-content: center;
    flex-wrap: wrap;
    border-top: 1px solid rgba(201,166,75,0.15);
    padding-top: 8px;
  }
  .main-nav a { font-size: 11px; padding: 5px 8px; }
}

@media (max-width: 480px) {
  .brand-divider { display: none; }
  .wa-label { display: none; }
  .wa-number { font-size: 11px; }
}
</style>


<header class="site-header">
  <div class="header-inner">

    <!-- LOGO + BRAND -->
    <a href="index.html" class="logo-area">
      <img src="assets/images/logo.png" alt="Dwarkesh Polyfab Logo">
      <div class="brand-divider"></div>
      <div class="brand-text">
        <span class="brand-name">Dwarkesh Polyfab</span>
        <span class="brand-tagline">Woven Packaging Solution</span>
      </div>
    </a>

    <!-- NAVIGATION -->
    <nav class="main-nav">
      <a href="index.html">Home</a>
      <a href="products/index.html">Products</a>
      <a href="calculators/index.html">Calculators</a>
      <a href="industries/index.html">Industries</a>
      <a href="blog/index.html">Blog</a>
      <a href="pages/contact.html">Contact</a>
    </nav>

    <!-- WHATSAPP -->
    <div class="header-contact">
      <a class="wa-btn" href="https://wa.me/918320525550" target="_blank">
        <img class="wa-icon" src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp">
        <div class="wa-btn-text">
          <span class="wa-label">WhatsApp Us</span>
          <span class="wa-number">+91 83205 25550</span>
        </div>
      </a>
    </div>

  </div>
</header>
