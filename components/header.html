<!-- components/header.html — Dwarkesh Polyfab -->

<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Lato:wght@300;400;600;700&display=swap');

/* ── RESET ── */
.site-header *, .site-header *::before, .site-header *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

/* ── HEADER WRAP ── */
.site-header {
  width: 100%;
  background: #112a46;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}

/* ── TOP GOLD LINE ── */
.site-header::before {
  content: '';
  display: block;
  height: 3px;
  background: linear-gradient(90deg, transparent, #c9a64b 30%, #f0d97a 50%, #c9a64b 70%, transparent);
}

/* ── HEADER INNER ── */
.header-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 30px;
  height: 66px;
  max-width: 1400px;
  margin: 0 auto;
  gap: 16px;
}

/* ════════════
   LOGO + BRAND
═════════════ */
.logo-area {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
  flex-shrink: 0;
}

.logo-area img {
  height: 42px;
  width: 42px;
  object-fit: contain;
  border-radius: 4px;
  display: block;
  filter: drop-shadow(0 0 5px rgba(201,166,75,0.4));
}

.brand-divider {
  width: 1px;
  height: 34px;
  background: linear-gradient(to bottom, transparent, #c9a64b, transparent);
  flex-shrink: 0;
}

.brand-text {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.brand-name {
  font-family: 'Cinzel', Georgia, serif;
  font-size: 18px;
  font-weight: 900;
  color: #c9a64b;
  letter-spacing: 2px;
  white-space: nowrap;
  line-height: 1;
}

.brand-tagline {
  font-family: 'Lato', Arial, sans-serif;
  font-size: 9px;
  font-weight: 400;
  color: #7fa3bf;
  letter-spacing: 3.5px;
  text-transform: uppercase;
  white-space: nowrap;
  line-height: 1;
}

/* ════════════
   DESKTOP NAV
═════════════ */
.main-nav {
  display: flex;
  align-items: center;
  flex: 1;
  justify-content: center;
  gap: 0;
}

.main-nav a {
  font-family: 'Lato', Arial, sans-serif;
  color: #c8d8e4;
  text-decoration: none;
  font-size: 12px;
  font-weight: 700;
  padding: 6px 12px;
  border-radius: 4px;
  transition: color 0.2s, background 0.2s;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  white-space: nowrap;
  position: relative;
}

.main-nav a::after {
  content: '';
  position: absolute;
  bottom: 2px;
  left: 12px;
  right: 12px;
  height: 1.5px;
  background: #c9a64b;
  transform: scaleX(0);
  transition: transform 0.2s ease;
}

.main-nav a:hover { color: #c9a64b; background: rgba(201,166,75,0.08); }
.main-nav a:hover::after { transform: scaleX(1); }

/* ════════════════
   WHATSAPP BUTTON
════════════════ */
.header-contact { flex-shrink: 0; }

.wa-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  padding: 8px 14px;
  border-radius: 6px;
  background: #1a9e4a;
  border: 1.5px solid #22b855;
  box-shadow: 0 2px 10px rgba(26,158,74,0.3);
  transition: all 0.25s ease;
  white-space: nowrap;
}

.wa-btn:hover {
  background: #20b854;
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(26,158,74,0.45);
}

.wa-icon {
  width: 20px;
  height: 20px;
  min-width: 20px;
  display: block;
  object-fit: contain;
}

.wa-btn-text {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.wa-label {
  font-family: 'Lato', Arial, sans-serif;
  font-size: 8px;
  font-weight: 700;
  color: rgba(255,255,255,0.7);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  line-height: 1;
}

.wa-number {
  font-family: 'Lato', Arial, sans-serif;
  font-size: 12px;
  font-weight: 700;
  color: #ffffff;
  letter-spacing: 0.3px;
  line-height: 1;
}

/* ════════════════════
   HAMBURGER BUTTON
════════════════════ */
.hamburger {
  display: none;
  flex-direction: column;
  justify-content: center;
  gap: 5px;
  width: 38px;
  height: 38px;
  background: rgba(201,166,75,0.1);
  border: 1.5px solid rgba(201,166,75,0.35);
  border-radius: 6px;
  cursor: pointer;
  padding: 8px;
  flex-shrink: 0;
}

.hamburger span {
  display: block;
  height: 2px;
  width: 100%;
  background: #c9a64b;
  border-radius: 2px;
  transition: all 0.3s ease;
}

/* Animate to X when open */
.hamburger.open span:nth-child(1) {
  transform: translateY(7px) rotate(45deg);
}
.hamburger.open span:nth-child(2) {
  opacity: 0;
}
.hamburger.open span:nth-child(3) {
  transform: translateY(-7px) rotate(-45deg);
}

/* ════════════════════
   MOBILE DRAWER NAV
════════════════════ */
.mobile-nav {
  display: none;
  flex-direction: column;
  background: #0d2038;
  border-top: 1px solid rgba(201,166,75,0.2);
  padding: 8px 0 12px;
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s ease;
}

.mobile-nav.open {
  max-height: 400px;
}

.mobile-nav a {
  font-family: 'Lato', Arial, sans-serif;
  color: #c8d8e4;
  text-decoration: none;
  font-size: 13px;
  font-weight: 600;
  padding: 13px 24px;
  text-transform: uppercase;
  letter-spacing: 1px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  transition: color 0.2s, background 0.2s;
  display: flex;
  align-items: center;
  gap: 10px;
}

.mobile-nav a::before {
  content: '';
  width: 4px;
  height: 4px;
  background: #c9a64b;
  border-radius: 50%;
  flex-shrink: 0;
}

.mobile-nav a:hover {
  color: #c9a64b;
  background: rgba(201,166,75,0.06);
}

/* ════════════════════
   RESPONSIVE
════════════════════ */
@media (max-width: 768px) {
  /* Show hamburger, hide desktop nav */
  .hamburger { display: flex; }
  .main-nav { display: none; }
  .mobile-nav { display: flex; }

  .header-inner {
    padding: 0 16px;
    height: 60px;
  }

  /* Hide WhatsApp label on mobile — show icon + number only */
  .wa-label { display: none; }
  .wa-btn { padding: 7px 12px; gap: 7px; }
  .wa-number { font-size: 11px; }

  .brand-name { font-size: 15px; letter-spacing: 1.5px; }
  .brand-tagline { font-size: 8px; letter-spacing: 2.5px; }
}

@media (max-width: 380px) {
  .brand-divider { display: none; }
  .brand-tagline { display: none; }
  .brand-name { font-size: 14px; }
}
</style>


<!-- ══ MAIN HEADER ══ -->
<header class="site-header">

  <!-- TOP BAR: Logo + Nav (desktop) + WhatsApp + Hamburger -->
  <div class="header-inner">

    <!-- LOGO + BRAND NAME -->
    <a href="index.html" class="logo-area">
      <img src="assets/images/logo.png" alt="Dwarkesh Polyfab Logo">
      <div class="brand-divider"></div>
      <div class="brand-text">
        <span class="brand-name">Dwarkesh Polyfab</span>
        <span class="brand-tagline">Woven Packaging Solution</span>
      </div>
    </a>

    <!-- DESKTOP NAVIGATION -->
    <nav class="main-nav">
      <a href="index.html">Home</a>
      <a href="products/index.html">Products</a>
      <a href="calculators/index.html">Calculators</a>
      <a href="industries/index.html">Industries</a>
      <a href="blog/index.html">Blog</a>
      <a href="pages/contact.html">Contact</a>
    </nav>

    <!-- WHATSAPP BUTTON -->
    <div class="header-contact">
      <a class="wa-btn" href="https://wa.me/918320525550" target="_blank">
        <img class="wa-icon" src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp">
        <div class="wa-btn-text">
          <span class="wa-label">WhatsApp Us</span>
          <span class="wa-number">+91 83205 25550</span>
        </div>
      </a>
    </div>

    <!-- HAMBURGER — mobile only -->
    <button class="hamburger" id="hamburger" aria-label="Menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

  </div>

  <!-- MOBILE SLIDE-DOWN NAV -->
  <nav class="mobile-nav" id="mobile-nav">
    <a href="index.html">Home</a>
    <a href="products/index.html">Products</a>
    <a href="calculators/index.html">Calculators</a>
    <a href="industries/index.html">Industries</a>
    <a href="blog/index.html">Blog</a>
    <a href="pages/contact.html">Contact</a>
  </nav>

</header>

<script>
  (function() {
    var btn = document.getElementById('hamburger');
    var nav = document.getElementById('mobile-nav');
    if (btn && nav) {
      btn.addEventListener('click', function() {
        btn.classList.toggle('open');
        nav.classList.toggle('open');
      });
      // Close when a link is clicked
      nav.querySelectorAll('a').forEach(function(a) {
        a.addEventListener('click', function() {
          btn.classList.remove('open');
          nav.classList.remove('open');
        });
      });
    }
  })();
</script>
