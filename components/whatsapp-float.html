<!-- components/whatsapp-float.html - Dwarkesh Polyfab optimized WhatsApp float -->

<style>
  .wa-float {
    position: fixed;
    right: 22px;
    bottom: 24px;
    z-index: 99999;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 10px;
  }

  .wa-float-tooltip {
    background: #ffffff;
    color: #112a46;
    font-size: 13px;
    font-weight: 800;
    padding: 8px 13px;
    border-radius: 8px;
    box-shadow: 0 8px 24px rgba(17,42,70,0.18);
    white-space: nowrap;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.22s ease, transform 0.22s ease;
    pointer-events: none;
  }

  .wa-float:hover .wa-float-tooltip,
  .wa-float:focus-within .wa-float-tooltip {
    opacity: 1;
    transform: translateY(0);
  }

  .wa-float-btn {
    width: 58px;
    height: 58px;
    border-radius: 12px;
    background: #16833f;
    border: 2px solid #22b855;
    color: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    box-shadow: 0 10px 26px rgba(22,131,63,0.34);
    transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
  }

  .wa-float-btn:hover,
  .wa-float-btn:focus-visible {
    background: #1a9e4a;
    transform: translateY(-2px);
    box-shadow: 0 12px 30px rgba(22,131,63,0.42);
  }

  .wa-float-btn .wa-svg {
    width: 31px;
    height: 31px;
    display: block;
    flex-shrink: 0;
  }

  @media (max-width: 768px) {
    .wa-float {
      right: 14px;
      bottom: 16px;
    }

    .wa-float-tooltip {
      display: none;
    }

    .wa-float-btn {
      width: 54px;
      height: 54px;
      border-radius: 12px;
    }

    .wa-float-btn .wa-svg {
      width: 29px;
      height: 29px;
    }
  }

  @media (max-width: 420px) {
    .wa-float {
      right: 12px;
      bottom: 14px;
    }

    .wa-float-btn {
      width: 52px;
      height: 52px;
    }
  }
</style>
